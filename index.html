<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafetería Escolar</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="app">

<header>
<h1>Cafetería Escolar</h1>
</header>

<section id="menu" class="pantalla activa">

<div class="tarjeta">
<img src="img/cafeteria.png" alt="cafeteria">
<h2>Menú</h2>
<button onclick="mostrarSeccion('comida')">Ver comida</button>
<button onclick="mostrarSeccion('bebidas')">Ver bebidas</button>
</div>

</section>

<section id="comida" class="pantalla">

<div class="tarjeta">
<h2>Comida</h2>
<p>Tacos, tortas, sandwiches</p>
<button onclick="volver()">Regresar</button>
</div>

</section>

<section id="bebidas" class="pantalla">

<div class="tarjeta">
<h2>Bebidas</h2>
<p>Agua, jugos, refrescos</p>
<button onclick="volver()">Regresar</button>
</div>

</section>

</div>

<script src="js/app.js"></script>

</body>
</html>
